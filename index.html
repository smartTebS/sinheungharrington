<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>해링턴스퀘어 신흥역 민원문자 전송 도구</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin: 0;
            font-weight: 700;
        }

        header p {
            color: #666;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            color: var(--secondary-color);
        }

        .card-title span {
            margin-right: 8px;
        }

        /* 수신번호 선택 스타일 추가 */
        .receiver-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .receiver-option {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 12px 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background: #fff;
        }

        .receiver-option.active {
            border-color: var(--accent-color);
            background-color: #f0f7ff;
        }

        .receiver-option .label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 4px;
            display: block;
        }

        .receiver-option .phone-num {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .receiver-option.active .phone-num {
            color: var(--accent-color);
        }

        /* 체크 표시 아이콘 */
        .receiver-option.active::after {
            content: '✓';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent-color);
            font-weight: bold;
        }

        .template-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 12px;
        }

        .template-btn {
            width: 100%;
            background: #fff;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: var(--border-radius);
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            position: relative;
            min-width: 0;
        }

        .template-btn:hover {
            border-color: var(--accent-color);
            background: #f0f7ff;
        }

        .template-btn:active {
            transform: scale(0.98);
        }

        .template-tag {
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--accent-color);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .info-text {
            font-size: 0.8rem;
            color: #888;
            margin-top: 15px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            font-size: 0.8rem;
            color: #aaa;
        }

        .hits {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📨 성남시 민원문자 전송</h1>
        <p>중앙동-성남시 민원 해결을 위한 문자 발송 도구</p>
    </header>

    <div class="card">
        <div class="card-title"><span>📱</span> 수신처 선택</div>
        <div class="receiver-selector">
            <div class="receiver-option active" onclick="selectReceiver(this, '01059200184')">
                <span class="label">성남시 민원</span>
                <span class="phone-num">010-5920-0184</span>
            </div>		
            <div class="receiver-option" onclick="selectReceiver(this, '0317296102')">
                <span class="label">성남시 중원구 시민봉사과</span>
                <span class="phone-num">031-729-6102</span>
            </div>		
        </div>
        <p class="info-text">※ 발송할 대상을 선택한 후 아래 문구를 <strong>탭</strong>하세요.</p>
    </div>

    <div class="card">
        <div class="card-title"><span>📝</span> 민원 내용 선택</div>

        <div class="template-list">
            <div class="template-btn" onclick="sendSMS(templates.underground)">
                <span class="template-tag">[신흥역 노상주차장 철거 주민 민원]</span>
                신흥역 앞 노상주차장은 도로 폭을 축소시켜 차량 통행 여건을 저해하고 보행 안전에 불안 요소로 작용하고 있으며... (전체 보기)
            </div>

           <!-- <div class="template-btn" onclick="sendSMS('공사 현장 소음 및 비산먼지 저감 대책 마련 요청드립니다.')">
                <span class="template-tag">환경 민원</span>
                공사 현장 소음 및 비산먼지 저감 대책 마련 요청
            </div>

            <div class="template-btn" onclick="sendSMS('성남시 중앙동 일대 생활 불편 사항 개선 및 조속한 답변을 요청합니다.')">
                <span class="template-tag">일반 민원</span>
                기타 생활 불편 사항 개선 요청
            </div> -->
        </div>
    </div>

    <div class="hits">
      <img src="https://hits.sh/smarttebs.github.io/sinheungharrington.svg?label=access" alt="Hits">
    </div>

    <footer>
        © 중앙동 민원 전송 도구 · 해링턴스퀘어 신흥역
    </footer>
</div>

<script>
// 전역 변수로 현재 선택된 수신번호 저장 (기본값 설정)
let selectedPhone = '01059200184';

const templates = {
    underground: `[신흥역 노상주차장 철거 주민 민원]
신흥역 앞 노상주차장은 도로 폭을 축소시켜
차량 통행 여건을 저해하고 보행 안전에 불안 요소로 작용하고 있습니다.

특히 해당 부지 인근에는 2027년 12월 약 2,200세대 규모의 공동주택 입주가 예정되어 있으며,
신흥3구역, 수진1·2구역 등 인근 재개발 사업이 진행 또는 예정되어 있어
향후 대규모 인구 유입과 교통 수요 증가가 예상되는 지역입니다.

이와 같은 여건을 고려할 때,
현재의 도로 구조 및 노상주차장 운영 방식은
중장기적인 교통 처리 능력과 보행 안전 측면에서
재검토가 필요한 상황이라고 판단됩니다.

또한 해당 구간은 산성대로 도시재생사업과 연계하여
녹지형 보행로 조성이 S-BRT 완료 이후 추진 예정인 것으로 알고 있으나,
국비 지원 여부 및 구체적 계획이 확정되지 않아
사업 지연 가능성 또한 우려되고 있습니다.

이에 따라 성남시는 향후 인구 증가 및 교통 수요 변화를 종합적으로 고려하여,
노상주차장 철거 또는 보행 공간 전환을 포함한
구체적인 실행 계획과 추진 일정을 조속히 수립해주시길 요청드립니다.

주민의 안전과 지속 가능한 도시 환경 조성을 위해
선제적이고 책임 있는 행정을 부탁드립니다.`
};

// 수신처 선택 함수
function selectReceiver(element, phone) {
    // 모든 옵션에서 active 클래스 제거
    document.querySelectorAll('.receiver-option').forEach(opt => {
        opt.classList.remove('active');
    });
    // 클릭된 요소에 active 클래스 추가
    element.classList.add('active');
    // 선택된 번호 업데이트
    selectedPhone = phone;
}

function sendSMS(message) {
    // 선택된 번호(selectedPhone)를 사용하여 URL 생성
    const smsUrl = `sms:${selectedPhone}${getSMSDivider()}body=${encodeURIComponent(message)}`;
    window.location.href = smsUrl;
}

function getSMSDivider() {
    return (navigator.userAgent.match(/iPhone|iPad|iPod/i) ? '&' : '?');
}
</script>

</body>
</html>
